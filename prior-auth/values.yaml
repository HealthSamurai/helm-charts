# =============================================================================
# prior-auth — ePA prior-authorization service. ClusterIP-internal (no ingress).
# Connects to the ADMIN Aidbox only.
# =============================================================================

nameOverride: ""
fullnameOverride: ""
replicaCount: 1

image:
  repository: healthsamurai/prior-auth
  tag: "2605"
  digest: ""
  pullPolicy: Always

imagePullSecrets: []

ports:
  - { name: http, containerPort: 8092 }

probe:
  path: /health
  port: 8092

resources:
  requests:
    cpu: 10m
    memory: 256Mi
  limits:
    memory: 512Mi

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

podAnnotations: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}

# ----- non-secret config -> ConfigMap, mounted via envFrom -----
config:
  AIDBOX_URL: "http://aidbox-admin-api"        # admin Aidbox, in-cluster
  AIDBOX_CLIENT_ID: prior-auth-app
  AIDBOX_APP_PORT: "8092"
  PRIOR_AUTH_APP_URL: "http://prior-auth:8092/"

# ----- secrets -> envFrom -----
secrets:
  mode: externalSecret
  storeRef:
    kind: ClusterSecretStore
    name: gcp-store
  refreshInterval: 1h
  remoteKeyPrefix: ""
  data:                          # dedicated client secret — NOT shared with other apps
    AIDBOX_CLIENT_SECRET: prior-auth--aidbox-client-secret
    AIDBOX_APP_SECRET: prior-auth--aidbox-app-secret
  existingSecretName: ""

service:
  type: ClusterIP
  sessionAffinity: null
  ports:
    - { name: http, port: 8092, targetPort: 8092 }

ingress:
  enabled: false
