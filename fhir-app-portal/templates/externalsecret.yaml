{{- if eq .Values.secrets.mode "externalSecret" }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "smartbox.fullname" . }}-secrets
  labels:
    {{- include "smartbox.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: {{ .Values.secrets.storeRef.kind }}
    name: {{ .Values.secrets.storeRef.name }}
  target:
    name: {{ include "smartbox.fullname" . }}-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    {{- $prefix := .Values.secrets.remoteKeyPrefix | default "" }}
    {{- range $secretKey, $remoteKey := .Values.secrets.data }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ printf "%s%s" $prefix $remoteKey | quote }}
    {{- end }}
{{- else if eq .Values.secrets.mode "existingSecret" }}
# secrets.mode=existingSecret: chart renders no Secret/ExternalSecret.
# The Deployment mounts the pre-existing Secret {{ .Values.secrets.existingSecretName | quote }} via envFrom.
{{- else }}
{{- fail "secrets.mode must be either \"externalSecret\" or \"existingSecret\"" }}
{{- end }}
