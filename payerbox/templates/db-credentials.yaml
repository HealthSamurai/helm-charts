{{- if .Values.dbCredentials.enabled }}
{{- $store := .Values.global.secretStore }}
{{- $prefix := .Values.global.secretStore.remoteKeyPrefix | default "" }}
# Basic-auth secret consumed by CNPG (bootstrap.initdb.secret). The same external
# keys back Aidbox's BOX_DB_USER/PASSWORD so the role password stays in sync.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.dbCredentials.secretName }}
  labels:
    app.kubernetes.io/part-of: payerbox
spec:
  refreshInterval: {{ .Values.aidboxSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: {{ $store.kind }}
    name: {{ $store.name }}
  target:
    name: {{ .Values.dbCredentials.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/basic-auth
  data:
    - secretKey: username
      remoteRef:
        key: {{ printf "%s%s" $prefix .Values.dbCredentials.username | quote }}
    - secretKey: password
      remoteRef:
        key: {{ printf "%s%s" $prefix .Values.dbCredentials.password | quote }}
{{- end }}
