replicaCount: 1

image:
  repository: healthsamurai/mdmbox
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext: {}

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt
  hosts:
    - host: mdmbox.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: mdmbox-tls
  #    hosts:
  #      - mdmbox.local

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  # limits:
  #   cpu: 2
  #   memory: 2Gi

livenessProbe:
  httpGet:
    path: /healthz
    port: main
  periodSeconds: 10
  failureThreshold: 10
readinessProbe:
  httpGet:
    path: /readyz
    port: main
  periodSeconds: 10
  successThreshold: 1
  failureThreshold: 5
startupProbe:
  httpGet:
    path: /readyz
    port: main
  initialDelaySeconds: 20
  periodSeconds: 5
  # 90 * 5s = 7.5 min — allows libox bootstrap (FHIR packages download/parse) on cold start
  failureThreshold: 90

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# -- Name of an existing ConfigMap with BOX_DB_* env vars
# (e.g. BOX_DB_HOST, BOX_DB_PORT, BOX_DB_DATABASE). Optional —
# convenience hook for the shared-Aidbox scenario where you already
# have an Aidbox ConfigMap. For standalone deployments leave empty
# and supply BOX_DB_* via .Values.config and/or extraEnvFromSecrets.
aidboxConfigMap: ""

# -- Name of an existing Secret with BOX_DB_USER, BOX_DB_PASSWORD.
# Optional — same shared-Aidbox convenience as aidboxConfigMap.
# For standalone, use extraEnvFromSecrets to mount your own Secret.
aidboxSecret: ""

# -- Names of additional ConfigMaps loaded into the pod via envFrom.
extraEnvFromConfigMaps: []

# -- Names of additional Secrets loaded into the pod via envFrom.
# Use this for BOX_DB_USER / BOX_DB_PASSWORD in standalone mode.
extraEnvFromSecrets: []

updateStrategy:
  type: RollingUpdate

# -- mdmbox config rendered into the chart's own ConfigMap.
# Holds mdmbox-specific env vars (license, JAVA_OPTS, …) and, in
# standalone mode, non-secret BOX_DB_* values (BOX_DB_HOST/PORT/DATABASE).
# Do NOT put credentials here — use extraEnvFromSecrets instead.
# MDMBOX_HTTP_PORT is injected from .Values.service.port in deployment.yaml
# (single source of truth).
config:
  JAVA_OPTS: "-XX:MaxRAMPercentage=75"

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true
