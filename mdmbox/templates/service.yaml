apiVersion: v1
kind: Service
metadata:
  name: {{ include "mdmbox.fullname" . }}
  labels:
    {{- include "mdmbox.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: main
      protocol: TCP
      name: http
  selector:
    {{- include "mdmbox.selectorLabels" . | nindent 4 }}
